version: "3.8"

services:
  peerclaw:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PEERCLAW_LOG=info
    volumes:
      - peerclaw-data:/data/.peerclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  peerclaw-data:
